<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Masjid Darussalam (3D Neumorphism)</title>

    <style>
        :root {
            /* Warna Utama Masjid */
            --primary-dark: #0a3622;
            --primary-main: #198754;
            --primary-light: #d1e7dd;
            
            /* Abu-abu Lembut untuk Latar Belakang Neumorphic */
            --neumorphic-bg: #e0e5ec; 
            
            /* Warna Teks */
            --text-main: #2b3035;
            --text-muted: #6c757d;

            /* Definisi Bayangan dan Highlight */
            --shadow-dark: #a3b1c6; /* Bayangan gelap */
            --shadow-light: #ffffff; /* Highlight terang */
        }

        /* Reset CSS */
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 95px; 
            /* Latar belakang harus memiliki warna yang solid agar efek shadow terlihat */
            background-color: var(--neumorphic-bg);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            /* Menghapus background image agar efek 3D lebih menonjol, atau bisa dikembalikan dengan opacity yang sangat rendah */
            /* background-image: linear-gradient(rgba(224, 229, 236, 0.85), rgba(224, 229, 236, 0.9)), url('209206-clean.png'); */
        }
        
        /* Header Neumorphic */
        .header {
            background: var(--neumorphic-bg);
            color: var(--primary-dark); 
            padding: 14px 18px; 
            text-align: center;
            border-bottom-left-radius: 28px; 
            border-bottom-right-radius: 28px;
            /* Header dibuat seolah-olah timbul di atas body */
            box-shadow: 
                8px 8px 16px var(--shadow-dark), 
                -8px -8px 16px var(--shadow-light);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-text { flex: 1; padding: 0 10px; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .header p { margin: 3px 0 0; font-size: 12px; font-weight: 600; color: var(--primary-main); }
        
        .logo-header {
            width: 42px; height: 42px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--primary-light);
            box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
        }

        /* Container & Card */
        .container { max-width: 480px; margin: 0 auto; padding: 25px 16px; }
        
        .card {
            /* Card dibuat seolah-olah timbul di atas body */
            background: var(--neumorphic-bg); 
            border-radius: 24px; 
            padding: 30px 24px;
            box-shadow: 
                12px 12px 24px var(--shadow-dark), 
                -12px -12px 24px var(--shadow-light);
            margin-bottom: 25px;
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Navigasi Bawah */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; 
            max-width: 480px; margin: 0 auto;
            background: var(--neumorphic-bg);
            /* Navbar dibuat seolah-olah melayang di atas body dengan bayangan lebih halus */
            box-shadow: 0 -8px 24px rgba(0,0,0,0.07);
            display: flex; 
            border-top: 1px solid rgba(255, 255, 255, 0.5); 
            height: 75px;
            z-index: 1000;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }
        
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-muted); text-decoration: none; font-size: 11px;
            background: none; border: none; font-weight: 600;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border-radius: 24px;
        }
        .nav-item.active { 
            color: var(--primary-main); 
            /* Tombol aktif dibuat seolah-olah tertekan ke dalam */
            background: var(--neumorphic-bg);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
        }
        .nav-item span { 
            font-size: 22px; 
            margin-bottom: 3px;
            transition: transform 0.2s ease;
        }
        .nav-item.active span {
            transform: scale(1.05);
        }

        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulir (Input Neumorphic) */
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        input, select {
            width: 100%; 
            padding: 16px 18px; 
            margin-bottom: 20px;
            border: none; 
            border-radius: 16px; 
            font-size: 15px;
            box-sizing: border-box;
            /* Input dibuat seolah-olah tertekan ke dalam */
            background-color: var(--neumorphic-bg);
            color: var(--text-main);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), 0 0 0 3px var(--primary-light);
        }
        
        /* Tombol Neumorphic */
        .btn-submit {
            background: var(--primary-main); /* Warna hijau dasar */
            color: white; 
            width: 100%;
            padding: 18px; 
            border: none; 
            border-radius: 16px;
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer;
            /* Tombol memiliki efek timbul */
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
            /* Tombol saat diklik menjadi seolah-olah tertekan */
            box-shadow: inset 6px 6px 12px rgba(0,0,0,0.2), inset -6px -6px 12px var(--primary-main);
            background: var(--primary-dark);
        }
        
        /* QRIS & Tombol WhatsApp */
        .qris-container { text-align: center; }
        .qris-img { 
            width: 100%; 
            max-width: 220px; 
            border-radius: 20px; 
            border: 1px solid rgba(224, 229, 236, 0.5);
            /* Gambar seolah-olah timbul */
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            margin: 15px 0;
            padding: 5px;
            background: white;
        }

        .qris-container p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 18px 0;
        }
        
        .btn-wa {
            background: #25D366; /* Warna hijau WhatsApp */
            color: white; 
            width: 100%;
            padding: 18px; 
            border: none; 
            border-radius: 16px;
            font-size: 16px; 
            font-weight: 700; 
            text-decoration: none;
            display: block; 
            box-sizing: border-box; 
            text-align: center;
            /* Tombol memiliki efek timbul */
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            transition: all 0.2s ease;
        }

        .btn-wa:active {
            transform: scale(0.98);
            /* Tombol saat diklik menjadi seolah-olah tertekan */
            box-shadow: inset 6px 6px 12px rgba(0,0,0,0.2), inset -6px -6px 12px #1ebe57;
            background: #1ebe57;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="209196-photoaidcom-cropped.jpg (2).png" alt="Logo Pemuda" class="logo-header">
        <div class="header-text">
            <h1>Masjid Darussalam</h1>
            <p>Absensi & Infaq Digital</p>
        </div>
        <img src="209194-photoaidcom-cropped.jpg.png" alt="Logo DKM" class="logo-header">
    </div>

    <div class="container">
        <!-- Halaman Absen -->
        <div id="page-absen" class="page active">
            <div class="card">
                <h3>📝 Absensi Jama'ah</h3>
                <form id="formAbsen">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    
                    <label>Tujuan Kehadiran</label>
                    <select id="tujuan" required>
                        <option value="" disabled selected>Pilih tujuan...</option>
                        <option>Sholat Berjamaah</option>
                        <option>Kajian Rutin</option>
                    </select>
                    
                    <button type="submit" class="btn-submit">Kirim Kehadiran</button>
                </form>
            </div>
        </div>

        <!-- Halaman QRIS -->
        <div id="page-qris" class="page">
            <div class="card qris-container">
                <h3>🕌 Infaq & Sedekah</h3>
                <img src="IMG_20260719_225515_701.png" alt="QRIS" class="qris-img">
                <hr style="border: none; border-top: 1px solid rgba(0,0,0,0.05); margin: 20px 0;">
                <p>Sudah berinfaq? Konfirmasikan transaksi Anda melalui WhatsApp:</p>
                <a href="https://wa.me/62895637310335?text=Assalamualaikum,%20saya%20ingin%20mengirimkan%20bukti%20transaksi%20infaq." class="btn-wa">
                    📱 Kirim Bukti Transaksi
                </a>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-absen" onclick="bukaTab('absen')">
            <span>📝</span>Absen
        </button>
        <button class="nav-item" id="nav-qris" onclick="bukaTab('qris')">
            <span>💰</span>Infaq QRIS
        </button>
    </div>

    <script>
        function bukaTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
