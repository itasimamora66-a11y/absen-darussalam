<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Masjid Darussalam</title>

    <style>
        :root {
            --primary-dark: #072e1c;
            --primary-main: #137547;
            --primary-light: #28a745;
            --text-main: #212529;
            --text-muted: #6c757d;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            margin: 0; 
            padding: 0; 
            padding-bottom: 95px; 
            /* Mengembalikan background motif masjid dengan overlay gradasi hijau profesional */
            background-color: #0a3622;
            background-image: linear-gradient(135deg, rgba(10, 54, 34, 0.88), rgba(7, 46, 28, 0.94)), url('209206-clean.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header dengan Efek 3D Mengambang */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            color: var(--primary-dark); 
            padding: 14px 18px; 
            text-align: center;
            border-bottom-left-radius: 24px; 
            border-bottom-right-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25), 0 1px 3px rgba(255, 255, 255, 0.5) inset;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-text { flex: 1; padding: 0 10px; }
        .header h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .header p { margin: 3px 0 0; font-size: 12px; font-weight: 600; color: var(--primary-main); }
        
        .logo-header {
            width: 42px; height: 42px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--primary-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* Container & Card 3D */
        .container { max-width: 480px; margin: 0 auto; padding: 22px 16px; }
        
        .card {
            background: rgba(255, 255, 255, 0.96); 
            backdrop-filter: blur(10px);
            border-radius: 24px; 
            padding: 26px 20px;
            /* Efek 3D mengambang (Floating Card) yang kuat */
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3), 0 2px 6px rgba(255, 255, 255, 0.8) inset;
            margin-bottom: 22px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .card h3 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Navigasi Bawah 3D Mengambang */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; 
            max-width: 480px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(15px);
            display: flex; 
            height: 75px;
            z-index: 1000;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            box-shadow: 0 -8px 30px rgba(0, 0, 0, 0.25), 0 1px 3px rgba(255, 255, 255, 0.8) inset;
        }
        
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-muted); text-decoration: none; font-size: 11px;
            background: none; border: none; font-weight: 600;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            border-radius: 20px;
            margin: 6px;
        }
        .nav-item.active { 
            color: white; 
            background: linear-gradient(135deg, var(--primary-main), var(--primary-dark));
            box-shadow: 0 6px 15px rgba(19, 117, 71, 0.4), inset 0 1px 2px rgba(255,255,255,0.4);
        }
        .nav-item span { 
            font-size: 20px; 
            margin-bottom: 2px;
            transition: transform 0.2s ease;
        }
        .nav-item.active span {
            transform: scale(1.1);
        }

        .page { display: none; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Formulir */
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%; 
            padding: 15px 16px; 
            margin-bottom: 18px;
            border: 1.5px solid #dcdcdc; 
            border-radius: 14px; 
            font-size: 15px;
            box-sizing: border-box;
            background-color: #fcfcfc;
            color: var(--text-main);
            /* Efek cekung 3D (inset shadow) pada kolom input */
            box-shadow: inset 0 3px 6px rgba(0, 0, 0, 0.06);
            transition: all 0.25s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-main);
            background-color: #fff;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.04), 0 0 0 4px rgba(19, 117, 71, 0.15);
        }
        
        /* Tombol Utama 3D Timbul */
        .btn-submit {
            background: linear-gradient(135deg, var(--primary-light), var(--primary-dark)); 
            color: white; 
            width: 100%;
            padding: 16px; 
            border: none; 
            border-radius: 14px;
            font-size: 16px; 
            font-weight: 700;
            cursor: pointer;
            /* Efek tombol 3D menonjol keluar */
            box-shadow: 0 8px 20px rgba(19, 117, 71, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
            box-shadow: 0 3px 10px rgba(19, 117, 71, 0.3), inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        /* QRIS & Tombol WhatsApp */
        .qris-container { text-align: center; }
        .qris-img { 
            width: 100%; 
            max-width: 230px; 
            border-radius: 16px; 
            border: 1px solid #ddd;
            /* Gambar QRIS dibuat timbul */
            box-shadow: 0 8px 20px rgba(0,0,0,0.12), inset 0 1px 2px rgba(255,255,255,0.8);
            margin: 12px 0;
            padding: 6px;
            background: white;
        }

        .qris-container p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 16px 0;
        }
        
        .btn-wa {
            background: linear-gradient(135deg, #25D366, #128C7E); 
            color: white; 
            width: 100%;
            padding: 16px; 
            border: none; 
            border-radius: 14px;
            font-size: 16px; 
            font-weight: 700; 
            text-decoration: none;
            display: block; 
            box-sizing: border-box; 
            text-align: center;
            /* Efek 3D menonjol untuk tombol WhatsApp */
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.4), inset 0 2px 4px rgba(255, 255, 255, 0.4);
            transition: all 0.2s ease;
        }

        .btn-wa:active {
            transform: scale(0.98);
            box-shadow: 0 3px 10px rgba(37, 211, 102, 0.3), inset 0 1px 2px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="209196-photoaidcom-cropped.jpg (2).png" alt="Logo Pemuda" class="logo-header">
        <div class="header-text">
            <h1>Masjid Darussalam</h1>
            <p>Absensi & Infaq Digital</p>
        </div>
        <img src="209194-photoaidcom-cropped.jpg.png" alt="Logo DKM" class="logo-header">
    </div>

    <div class="container">
        <!-- Halaman Absen -->
        <div id="page-absen" class="page active">
            <div class="card">
                <h3>📝 Absensi Jama'ah</h3>
                <form id="formAbsen">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
                    
                    <label>Tujuan Kehadiran</label>
                    <select id="tujuan" required>
                        <option value="" disabled selected>Pilih tujuan...</option>
                        <option>Sholat Berjamaah</option>
                        <option>Kajian Rutin</option>
                    </select>
                    
                    <button type="submit" class="btn-submit">Kirim Kehadiran</button>
                </form>
            </div>
        </div>

        <!-- Halaman QRIS -->
        <div id="page-qris" class="page">
            <div class="card qris-container">
                <h3>🕌 Infaq & Sedekah</h3>
                <img src="IMG_20260719_225515_701.png" alt="QRIS" class="qris-img">
                <hr style="border: none; border-top: 1px solid #eee; margin: 18px 0;">
                <p>Sudah berinfaq? Konfirmasikan transaksi Anda melalui WhatsApp:</p>
                <a href="https://wa.me/62895637310335?text=Assalamualaikum,%20saya%20ingin%20mengirimkan%20bukti%20transaksi%20infaq." class="btn-wa">
                    📱 Kirim Bukti Transaksi
                </a>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-absen" onclick="bukaTab('absen')">
            <span>📝</span>Absen
        </button>
        <button class="nav-item" id="nav-qris" onclick="bukaTab('qris')">
            <span>💰</span>Infaq QRIS
        </button>
    </div>

    <script>
        function bukaTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
