<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Masjid Darussalam</title>

    <style>
        :root {
            --hijau-tua: #1b5e20;
            --hijau-cerah: #2e7d32;
        }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 0; 
            padding-bottom: 80px; 
            background-image: url('209206-clean.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.9);
            color: var(--hijau-tua); 
            padding: 20px 15px; 
            text-align: center;
            border-bottom-left-radius: 30px; 
            border-bottom-right-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex; 
            align-items: center; 
            justify-content: space-between;
        }
        .header-text { flex: 1; }
        .header h1 { margin: 0; font-size: 20px; }
        .header p { margin: 5px 0 0; font-size: 12px; opacity: 0.8; }
        
        .logo-header {
            width: 45px; height: 45px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid var(--hijau-cerah);
        }

        .container { padding: 20px; }
        .card {
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; border-top: 1px solid #eee; height: 70px;
            z-index: 1000;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #888; text-decoration: none; font-size: 12px;
            background: none; border: none; font-weight: bold;
        }
        .nav-item.active { color: var(--hijau-cerah); }
        .nav-item span { font-size: 24px; margin-bottom: 4px; }

        .page { display: none; }
        .page.active { display: block; }

        input, select {
            width: 100%; padding: 14px; margin-bottom: 20px;
            border: 1px solid #ddd; border-radius: 12px; font-size: 16px;
            box-sizing: border-box;
        }
        
        .btn-submit {
            background: var(--hijau-cerah); color: white; width: 100%;
            padding: 16px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold;
        }
        
        .qris-container { text-align: center; }
        .qris-img { width: 100%; max-width: 280px; border-radius: 15px; }
        
        .btn-wa {
            background: #25D366; color: white; width: 100%;
            padding: 16px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; text-decoration: none;
            display: block; box-sizing: border-box; margin-top: 15px; text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="209196-photoaidcom-cropped.jpg (2).png" alt="Logo Pemuda" class="logo-header">
        <div class="header-text">
            <h1>Masjid Darussalam</h1>
            <p>Absensi & Infaq Digital</p>
        </div>
        <img src="209194-photoaidcom-cropped.jpg.png" alt="Logo DKM" class="logo-header">
    </div>

    <div class="container">
        <!-- Halaman Absen -->
        <div id="page-absen" class="page active">
            <div class="card">
                <h3>📝 Absensi Jama'ah</h3>
                <form id="formAbsen">
                    <label>Nama Lengkap</label>
                    <input type="text" id="nama" required>
                    <label>Tujuan</label>
                    <select id="tujuan" required>
                        <option>Sholat Berjamaah</option>
                        <option>Kajian Rutin</option>
                    </select>
                    <button type="submit" class="btn-submit">Kirim Kehadiran</button>
                </form>
            </div>
        </div>

        <!-- Halaman QRIS -->
        <div id="page-qris" class="page">
            <div class="card qris-container">
                <h3>🕌 Infaq & Sedekah</h3>
                <img src="IMG_20260719_225515_701.png" alt="QRIS" class="qris-img">
                <hr style="margin: 20px 0;">
                <p>Sudah Berinfaq? Kirim bukti transaksi Anda:</p>
                <a href="https://wa.me/62895637310335?text=Assalamualaikum,%20saya%20ingin%20mengirimkan%20bukti%20transaksi%20infaq." class="btn-wa">
                    📱 Kirim Bukti Transaksi
                </a>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="nav-absen" onclick="bukaTab('absen')"><span>📝</span>Absen</button>
        <button class="nav-item" id="nav-qris" onclick="bukaTab('qris')"><span>💰</span>Infaq QRIS</button>
    </div>

    <script>
        function bukaTab(tab) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
